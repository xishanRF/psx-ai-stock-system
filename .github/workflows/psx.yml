name: PSX Data Fetch

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: pip install pandas requests

      - run: python fetch_psx.py
